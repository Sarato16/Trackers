<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tales of Runaterra</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:Georgia, serif;

    background-image:url('img/runaterra_menu.webp');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;

    overflow:hidden;
}

body::before{
    content:"";

    position:fixed;
    inset:0;

    background:rgba(0,0,0,0.45);
}

.container{

    position:relative;
    z-index:2;

    width:100%;
    max-width:650px;

    padding:40px;
}

.title{

    text-align:center;

    font-size:72px;

    color:#d6b36a;

    margin-bottom:50px;

    text-shadow:
    0 0 10px rgba(0,0,0,0.8),
    0 0 30px rgba(0,0,0,0.6);

    letter-spacing:3px;
}

.menu{

    display:flex;
    flex-direction:column;
    gap:20px;
}

.character{

    display:flex;
    align-items:center;

    gap:20px;

    padding:18px 25px;

    background:rgba(10,10,15,0.82);

    border:1px solid rgba(214,179,106,0.4);

    border-radius:14px;

    text-decoration:none;

    color:#d6b36a;

    font-size:30px;

    transition:0.25s;

    backdrop-filter:blur(4px);
}

.character:hover{

    transform:scale(1.03);

    background:rgba(20,20,30,0.95);

    border-color:#d6b36a;

    box-shadow:
    0 0 20px rgba(214,179,106,0.35);
}

.icon{

    width:55px;
    height:55px;

    object-fit:contain;
}

@media(max-width:700px){

    .container{
        padding:20px;
    }

    .title{
        font-size:42px;
    }

    .character{
        font-size:22px;
        padding:15px;
    }

    .icon{
        width:40px;
        height:40px;
    }

}

</style>
</head>

<body>

<div class="container">

    <div class="title">
        TALES OF RUNATERRA
    </div>

    <div class="menu">

        <a href="sarato.html" class="character">
            <img src="img/icons/sarato.png" class="icon">
            <span>Sarato</span>
        </a>

        <a href="ethan.html" class="character">
            <img src="img/icons/ethan.png" class="icon">
            <span>Ethan</span>
        </a>

        <a href="elizabeth.html" class="character">
            <img src="img/icons/elizabeth.png" class="icon">
            <span>Elizabeth</span>
        </a>

        <a href="claire.html" class="character">
            <img src="img/icons/claire.png" class="icon">
            <span>Claire</span>
        </a>

        <a href="baldor.html" class="character">
            <img src="img/icons/baldor.png" class="icon">
            <span>Baldor</span>
        </a>

        <a href="erks.html" class="character">
            <img src="img/icons/erks.png" class="icon">
            <span>Erk's</span>
        </a>

    </div>

</div>

</body>
</html>
