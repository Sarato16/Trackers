<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tales of Runaterra</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap');

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  height: 100%;
}

body {
  margin: 0;
  min-height: 100vh;
  background: #000;
  color: #ddd;
  font-family: 'Cormorant Garamond', serif;
  overflow-x: hidden;
}

/* Fondo */
.bg {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  z-index: -2;
  filter: saturate(0.9) contrast(1.05);
}

.bg-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  background: radial-gradient(ellipse at center, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.75) 100%);
  z-index: -1;
}

/* Contenido */
.content {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 0 24px 24px;
}

/* Header */
.header {
  padding-top: 70px;
  padding-bottom: 20px;
}

.title-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 24px;
  max-width: 1000px;
  margin: 0 auto;
}

.line {
  flex: 0 1 140px;
  height: 1px;
  opacity: 0.7;
}

.line.left {
  background: linear-gradient(to left, #d4af37, transparent);
}

.line.right {
  background: linear-gradient(to right, #d4af37, transparent);
}

h1 {
  font-family: 'Cinzel', serif;
  font-weight: 400;
  letter-spacing: 0.4em;
  color: #e8d9a9;
  text-shadow: 0 0 10px rgba(212,175,55,0.5), 0 0 30px rgba(212,175,55,0.25), 0 2px 4px rgba(0,0,0,0.8);
  font-size: clamp(1.5rem, 4.5vw, 2.8rem);
  text-align: center;
  white-space: nowrap;
}

.subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 400;
  color: #a89e8c;
  text-align: center;
  font-size: clamp(1.1rem, 2.2vw, 1.4rem);
  margin-top: 18px;
  letter-spacing: 0.03em;
  text-shadow: 0 2px 6px rgba(0,0,0,0.8);
}

/* Grid */
.grid {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  gap: 14px;
  flex-wrap: nowrap;
  overflow-x: auto;
  max-width: 100%;
  width: 100%;
  margin: 24px auto 16px;
  padding: 0 16px 12px;
  scrollbar-width: thin;
}

.card {
  position: relative;
  display: block;
  flex: 0 0 auto;
  width: clamp(160px, 14.5vw, 210px);
  border-radius: 12px;
  overflow: hidden;
  background: rgba(8,6,4,0.35);
  box-shadow: 0 10px 30px rgba(0,0,0,0.8), inset 0 0 24px rgba(0,0,0,0.6);
  outline: 2px solid transparent;
  outline-offset: -2px;
  transition: transform 0.35s ease, box-shadow 0.35s ease, outline-color 0.35s ease;
  text-decoration: none;
  -webkit-tap-highlight-color: transparent;
}

.card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.4) 100%);
  opacity: 0.6;
  pointer-events: none;
  transition: opacity 0.35s ease;
  z-index: 2;
}

.card img {
  width: 100%;
  height: auto;
  aspect-ratio: 2/3;
  object-fit: contain;
  display: block;
  position: relative;
  z-index: 1;
  filter: brightness(0.95) contrast(1.05) drop-shadow(0 8px 16px rgba(0,0,0,0.8));
  transition: filter 0.35s ease, transform 0.35s ease;
}

.card .label {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 3;
  padding: 28px 12px 18px;
  text-align: center;
  font-family: 'Cinzel', serif;
  font-weight: 400;
  font-size: 1.1rem;
  letter-spacing: 0.22em;
  color: #e8d9a9;
  background: linear-gradient(to top, rgba(0,0,0,0.9) 10%, rgba(0,0,0,0.6) 40%, transparent 100%);
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.35s ease, transform 0.35s ease;
  text-shadow: 0 1px 2px rgba(0,0,0,1), 0 0 12px rgba(212,175,55,0.4);
  pointer-events: none;
}

.card:hover,
.card:focus-visible {
  transform: scale(1.04);
  box-shadow: 0 0 25px rgba(212,175,55,0.35), 0 14px 40px rgba(0,0,0,0.9);
  outline-color: rgba(212,175,55,0.6);
}

.card:hover::before,
.card:focus-visible::before {
  opacity: 0.3;
}

.card:hover img,
.card:focus-visible img {
  filter: brightness(1.15) contrast(1.05) drop-shadow(0 8px 20px rgba(0,0,0,0.9));
}

.card:hover .label,
.card:focus-visible .label {
  opacity: 1;
  transform: translateY(0);
}

/* Footer */
footer {
  margin-top: auto;
  text-align: center;
  padding: 40px 0 16px;
  color: #666;
  font-size: 0.85rem;
  letter-spacing: 0.08em;
  font-family: 'Cormorant Garamond', serif;
}

/* Responsive */

  .line {
    flex-basis: 80px;
  }
}

@media (max-width: 699px) {
  .content {
    padding: 0 18px 18px;
  }
  .header {
    padding-top: 50px;
  }
  h1 {
    letter-spacing: 0.25em;
    white-space: normal;
    line-height: 1.2;
  }
  .title-wrap {
    flex-direction: column;
    gap: 12px;
  }
  .line {
    width: 120px;
    flex-basis: auto;
  }
  .line.left {
    background: linear-gradient(to right, transparent, #d4af37, transparent);
  }
  .line.right {
    display: none;
  }
  .grid {
    
    gap: 26px;
    margin-top: 40px;
  }
  .card {
    max-width: 320px;
  }
  .card .label {
    opacity: 1;
    transform: translateY(0);
    padding: 22px 12px 14px;
    font-size: 1rem;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 60%, transparent);
  }
}

@media (hover: none) {
  .card .label {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>
<body>
  <img src="img/fondo.png" alt="" class="bg" aria-hidden="true">
  <div class="bg-overlay" aria-hidden="true"></div>

  <main class="content">
    <header class="header">
      <div class="title-wrap">
        <span class="line left"></span>
        <h1>TALES OF RUNATERRA</h1>
        <span class="line right"></span>
      </div>
      <p class="subtitle">Selecciona tu crónica</p>
    </header>

    <section class="grid" aria-label="Selección de personajes">
      <a href="ethan.html" class="card" aria-label="Ethan">
        <img src="img/ethan1.png" alt="Ethan, cazador marcado">
        <span class="label">ETHAN</span>
      </a>

      <a href="elizabeth.html" class="card" aria-label="Elizabeth">
        <img src="img/elizabeth1.png" alt="Elizabeth, guardiana del velo">
        <span class="label">ELIZABETH</span>
      </a>

      <a href="sarato.html" class="card" aria-label="Sarato">
        <img src="img/sarato1.png" alt="Sarato, espectro de ceniza">
        <span class="label">SARATO</span>
      </a>

      <a href="claire.html" class="card" aria-label="Claire">
        <img src="img/claire1.png" alt="Claire, oráculo sangrante">
        <span class="label">CLAIRE</span>
      </a>

      <a href="baldor.html" class="card" aria-label="Baldor">
        <img src="img/baldor1.png" alt="Baldor, juramento de hierro">
        <span class="label">BALDOR</span>
      </a>

      <a href="erks.html" class="card" aria-label="Erks">
        <img src="img/erks1.png" alt="Erks, caminante errante">
        <span class="label">ERKS</span>
      </a>
    </section>

    <footer>
      Tales of Runaterra - Sistema de rol propio
    </footer>
  </main>
</body>
</html>
</body>
</html>
