<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tales of Runaterra</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background-image: url('img/imgrunaterra_menu.webp');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    overflow:hidden;

    font-family:Georgia, serif;
}

.overlay{

    position:relative;

    width:100%;
    max-width:700px;
    height:900px;
}

/* BOTONES */

.character{

    position:absolute;

    left:50%;
    transform:translateX(-50%);

    width:470px;
    height:72px;

    border-radius:14px;

    cursor:pointer;

    transition:0.25s;

    background:rgba(255,255,255,0);
}

.character:hover{

    background:rgba(214,179,106,0.12);

    box-shadow:
    0 0 20px rgba(214,179,106,0.35);
}

/* POSICIONES */

.sarato{
    top:285px;
}

.ethan{
    top:392px;
}

.elizabeth{
    top:500px;
}

.claire{
    top:608px;
}

.baldor{
    top:716px;
}

.erks{
    top:823px;
}

@media(max-width:900px){

    .overlay{

        transform:scale(0.8);
    }

}

@media(max-width:700px){

    .overlay{

        transform:scale(0.6);
    }

}

</style>
</head>

<body>

<div class="overlay">

    <a href="sarato.html" class="character sarato"></a>

    <a href="ethan.html" class="character ethan"></a>

    <a href="elizabeth.html" class="character elizabeth"></a>

    <a href="claire.html" class="character claire"></a>

    <a href="baldor.html" class="character baldor"></a>

    <a href="erks.html" class="character erks"></a>

</div>

</body>
</html>
