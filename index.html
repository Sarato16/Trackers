
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trackers</title>

<style>

body{
    margin:0;
    background:#0b0b0f;
    font-family:Arial, sans-serif;
    color:white;

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;
}

.container{
    width:100%;
    max-width:700px;
    padding:40px;
    box-sizing:border-box;
}

h1{
    text-align:center;
    margin-bottom:40px;
    font-size:42px;
    letter-spacing:2px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

a{
    background:#16161d;
    border:1px solid #2a2a35;

    border-radius:14px;

    padding:25px;

    text-align:center;

    text-decoration:none;
    color:white;

    font-size:22px;
    font-weight:bold;

    transition:0.2s;
}

a:hover{
    transform:translateY(-3px);
    background:#23232d;
    border-color:#555;
}

@media(max-width:700px){

    .grid{
        grid-template-columns:1fr;
    }

    h1{
        font-size:32px;
    }

}
</style>
</head>

<body>

<div class="container">

    <h1>Character Trackers</h1>

    </div>

</div>

</body>
</html>
