<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Botón Fantasy</title>

<style>
body{
    background:#0b1118;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    font-family: "Georgia", serif;
}

/* BOTÓN */
.fantasy-button{
    position:relative;
    width:340px;
    height:72px;

    background:
        linear-gradient(
            180deg,
            #102131 0%,
            #08131f 100%
        );

    border:2px solid #8b6a3f;
    clip-path:polygon(
        18px 0,
        calc(100% - 18px) 0,
        100% 18px,
        100% calc(100% - 18px),
        calc(100% - 18px) 100%,
        18px 100%,
        0 calc(100% - 18px),
        0 18px
    );

    display:flex;
    align-items:center;
    justify-content:center;

    color:#c89b5d;
    font-size:36px;
    letter-spacing:3px;
    text-transform:uppercase;

    box-shadow:
        inset 0 0 15px rgba(255,255,255,0.03),
        0 0 12px rgba(0,0,0,0.6);

    overflow:hidden;
    cursor:pointer;
    transition:0.25s ease;
}

/* Brillo interno */
.fantasy-button::before{
    content:"";
    position:absolute;
    inset:0;

    background:
        linear-gradient(
            180deg,
            rgba(255,255,255,0.08),
            transparent 40%
        );

    pointer-events:none;
}

/* Borde decorativo interno */
.fantasy-button::after{
    content:"";
    position:absolute;
    inset:6px;

    border:1px solid rgba(201,155,93,0.35);

    clip-path:polygon(
        12px 0,
        calc(100% - 12px) 0,
        100% 12px,
        100% calc(100% - 12px),
        calc(100% - 12px) 100%,
        12px 100%,
        0 calc(100% - 12px),
        0 12px
    );

    pointer-events:none;
}

/* ICONO */
.fantasy-button .icon{
    position:absolute;
    left:18px;

    width:42px;
    height:42px;

    display:flex;
    align-items:center;
    justify-content:center;

    color:#c89b5d;
    font-size:26px;
    text-shadow:0 0 6px rgba(255,215,150,0.4);
}

/* Hover */
.fantasy-button:hover{
    transform:translateY(-2px);

    box-shadow:
        inset 0 0 18px rgba(255,255,255,0.05),
        0 0 18px rgba(200,155,93,0.15);
}

/* Click */
.fantasy-button:active{
    transform:scale(0.98);
}
</style>
</head>

<body>

<button class="fantasy-button">
    <span class="icon">🛡</span>
    SARATO
</button>

</body>
</html>

</body>
</html>
